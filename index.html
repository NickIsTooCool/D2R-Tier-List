<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARPG Tier List - Ultimate Customizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            padding: 20px;
        }

        /* Admin Panel */
        .admin-panel {
            background: #1e1e1e;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .admin-group { display: flex; align-items: center; gap: 8px; }

        input[type="text"] {
            padding: 8px;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        input[type="color"] {
            border: none;
            width: 35px;
            height: 35px;
            cursor: pointer;
            background: none;
        }

        /* Power Indicator */
        .power-indicator {
            display: flex;
            justify-content: space-between;
            margin: 0 0 10px 90px; 
            color: #aaa;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Tier List */
        .tier-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 30px; }

        .tier-row {
            display: flex;
            background-color: #1a1a1a;
            min-height: 90px;
            border: 1px solid #333;
        }

        .tier-label {
            width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            color: rgba(0,0,0,0.7);
        }

        .tier-s { background-color: #ff7f7f; }
        .tier-a { background-color: #ffbf7f; }
        .tier-b { background-color: #ffff7f; }
        .tier-c { background-color: #7fff7f; }
        .tier-d { background-color: #7fbfff; }
        .tier-e { background-color: #7f7fff; }
        .tier-f { background-color: #444444; color: #fff; } /* Added F Tier Style */

        .drop-zone {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            gap: 10px;
            align-content: flex-start;
        }

        .item-pool-container {
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            min-height: 150px;
            border-radius: 8px;
        }

        /* Items */
        .item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: #222;
            border: 2px solid #444;
            border-radius: 4px;
            cursor: grab;
            user-select: none;
            font-weight: bold;
            font-size: 14px;
        }
        
        body.delete-mode .item {
            cursor: pointer;
            border-style: dashed !important;
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0% { transform: rotate(1deg); }
            50% { transform: rotate(-1deg); }
        }

        .drag-handle { color: #666; font-size: 18px; }
        .editable-text { outline: none; cursor: text; text-align: center; min-width: 50px; }

        /* Controls */
        .controls { margin-top: 30px; display: flex; gap: 15px; border-top: 1px solid #333; padding-top: 20px; }
        
        button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        .add-btn { background: #2e7d32; border-color: #1b5e20; }
        .del-mode-btn { background: #c62828; border-color: #b71c1c; }
        .del-mode-btn.active { background: #ffeb3b; color: black; }
        .reddit-btn { background: #ff4500; border-color: #ff5722; color: white; }
        .reset-btn { background: #444; color: #ffab40; border-color: #ffab40; }
        
        button:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <h1>ARPG Gear Tier List</h1>

    <div class="admin-panel">
        <div class="admin-group">
            <strong>Item Name:</strong>
            <input type="text" id="newItemName" placeholder="Enter name...">
        </div>
        <div class="admin-group">
            <strong>Color:</strong>
            <input type="color" id="newItemColor" value="#d0a85c">
        </div>
        <button class="add-btn" onclick="addNewCustomItem()">+ Create Item</button>
        <button id="delBtn" class="del-mode-btn" onclick="toggleDeleteMode()">Remove Items Mode</button>
    </div>

    <div class="power-indicator">
        <span>⬅ STRONGEST IN TIER</span>
        <span>WEAKEST IN TIER ➡</span>
    </div>

    <div class="tier-list">
        <div class="tier-row"><div class="tier-label tier-s">S</div><div class="drop-zone" id="s-tier"></div></div>
        <div class="tier-row"><div class="tier-label tier-a">A</div><div class="drop-zone" id="a-tier"></div></div>
        <div class="tier-row"><div class="tier-label tier-b">B</div><div class="drop-zone" id="b-tier"></div></div>
        <div class="tier-row"><div class="tier-label tier-c">C</div><div class="drop-zone" id="c-tier"></div></div>
        <div class="tier-row"><div class="tier-label tier-d">D</div><div class="drop-zone" id="d-tier"></div></div>
        <div class="tier-row"><div class="tier-label tier-e">E</div><div class="drop-zone" id="e-tier"></div></div>
        <div class="tier-row"><div class="tier-label tier-f">F</div><div class="drop-zone" id="f-tier"></div></div> </div>

    <h3>Inventory Pool</h3>
    <div class="item-pool-container drop-zone" id="item-pool"></div>

    <div class="controls">
        <button class="reddit-btn" onclick="copyForReddit()">📋 Copy for Reddit</button>
        <button class="reset-btn" onclick="resetToDefault()">Reset Website</button>
    </div>

    <script>
        const pool = document.getElementById('item-pool');
        let deleteMode = false;
        const SAVE_KEY = 'arpgTierList_V6'; // Incremented key for clean F-tier deployment

        function saveState() {
            const state = { tiers: {}, pool: [] };
            document.querySelectorAll('.tier-row').forEach(row => {
                const label = row.querySelector('.tier-label').innerText.toLowerCase();
                state.tiers[label] = Array.from(row.querySelectorAll('.item')).map(item => ({
                    text: item.querySelector('.editable-text').innerHTML,
                    color: item.style.color
                }));
            });
            state.pool = Array.from(document.querySelectorAll('#item-pool .item')).map(item => ({
                text: item.querySelector('.editable-text').innerHTML,
                color: item.style.color
            }));
            localStorage.setItem(SAVE_KEY, JSON.stringify(state));
        }

        function createItem(text, color) {
            const itemDiv = document.createElement('div');
            itemDiv.classList.add('item');
            itemDiv.setAttribute('draggable', 'true');
            itemDiv.style.color = color;
            itemDiv.style.borderColor = color;
            itemDiv.innerHTML = `<div class="drag-handle">⋮</div><div class="editable-text" contenteditable="true" spellcheck="false">${text}</div>`;
            
            const textField = itemDiv.querySelector('.editable-text');
            textField.addEventListener('mousedown', () => { if(!deleteMode) itemDiv.setAttribute('draggable', 'false'); });
            textField.addEventListener('blur', () => { itemDiv.setAttribute('draggable', 'true'); saveState(); });
            itemDiv.addEventListener('click', () => { if(deleteMode) { itemDiv.remove(); saveState(); } });
            return itemDiv;
        }

        function addNewCustomItem() {
            const name = document.getElementById('newItemName');
            const color = document.getElementById('newItemColor');
            if (!name.value.trim()) return;
            pool.appendChild(createItem(name.value, color.value));
            name.value = "";
            saveState();
        }

        function toggleDeleteMode() {
            deleteMode = !deleteMode;
            document.body.classList.toggle('delete-mode', deleteMode);
            document.getElementById('delBtn').innerText = deleteMode ? "CANCEL REMOVE" : "Remove Items Mode";
        }

        function resetToDefault() {
            if(confirm("Wipe all data and return to default?")) { localStorage.removeItem(SAVE_KEY); location.reload(); }
        }

        function copyForReddit() {
            let markdown = "# 🛡️ My ARPG Gear Tier List\n\n";
            markdown += "*Ranked Left-to-Right (Strongest to Weakest in Tier)*\n\n---\n\n";
            document.querySelectorAll('.tier-row').forEach(row => {
                const label = row.querySelector('.tier-label').innerText;
                const items = Array.from(row.querySelectorAll('.item')).map(item => item.querySelector('.editable-text').innerText.replace(/\n/g, " "));
                markdown += `### **${label} Tier**\n`;
                if (items.length > 0) {
                    items.forEach((name, index) => { markdown += `${index + 1}. **${name}**\n`; });
                } else { markdown += "*No items ranked here.*\n"; }
                markdown += "\n";
            });
            markdown += "---\n*Generated via custom ARPG Tier Maker tool.*";
            navigator.clipboard.writeText(markdown).then(() => { alert("Markdown copied to clipboard!"); });
        }

        // Initialization
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            const s = JSON.parse(saved);
            Object.keys(s.tiers).forEach(k => {
                const zone = document.querySelector(`.tier-label.tier-${k}`).nextElementSibling;
                if(zone) { // Check for existence (safe for F-tier migration)
                    s.tiers[k].forEach(i => zone.appendChild(createItem(i.text, i.color)));
                }
            });
            s.pool.forEach(i => pool.appendChild(createItem(i.text, i.color)));
        } else {
            const defs = [{cat: 'Magic', col: '#6969ff'}, {cat: 'Rare', col: '#ffff00'}, {cat: 'Unique', col: '#c7b377'}, {cat: 'Runeword', col: '#d0a85c'}];
            defs.forEach(d => ['Low', 'Mid', 'High', 'GG'].forEach(v => pool.appendChild(createItem(`${d.cat}<br>${v}`, d.col))));
        }

        // Drag Logic
        let draggedItem = null;
        document.addEventListener('dragstart', (e) => { if(e.target.classList?.contains('item') && !deleteMode) { draggedItem = e.target; e.target.style.opacity = '0.4'; } });
        document.addEventListener('dragend', () => { if(draggedItem) { draggedItem.style.opacity = '1'; draggedItem = null; saveState(); } });
        document.querySelectorAll('.drop-zone').forEach(z => {
            z.addEventListener('dragover', e => e.preventDefault());
            z.addEventListener('drop', () => { if (draggedItem) z.appendChild(draggedItem); });
        });
    </script>
</body>
</html>
